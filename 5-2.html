<!DOCTYPE html>

    <!-- Exercício 16 -->

<script>
const preco16 = Number(prompt("Digite o preço do produto:"));
const desconto16 = Number(prompt("Digite a porcentagem de desconto:"));
const valorDesconto16 = preco16 * (desconto16 / 100);
const precoFinal16 = preco16 - valorDesconto16;
console.log("Valor do desconto: R$", valorDesconto16.toFixed(2));
console.log("Preço final: R$", precoFinal16.toFixed(2));
alert(`Valor do desconto: R$ ${valorDesconto16.toFixed(2)}\nPreço final: R$ ${precoFinal16.toFixed(2)}`);
</script>

<!-- Exercício 17 -->

<script>
const celsius17 = Number(prompt("Digite a temperatura em Celsius:"));
const fahrenheit17 = celsius17 * 1.8 + 32;
console.log(`A temperatura em Fahrenheit é: ${fahrenheit17.toFixed(1)}°F`);
alert(`A temperatura em Fahrenheit é: ${fahrenheit17.toFixed(1)}°F`);
</script>

<!-- Exercício 18 -->

<script>
const dias18 = Number(prompt("Quantidade de dias de aluguel:"));
const km18 = Number(prompt("Quantidade de km rodados:"));
const preco18 = dias18 * 60 + km18 * 0.15;
console.log("O preço total a pagar é: R$", preco18.toFixed(2));
alert("O preço total a pagar é: R$ " + preco18.toFixed(2));
</script>

<!-- Exercício 19 -->

<script>
const idade19 = Number(prompt("Digite sua idade:"));
let situacao19;
if (idade19 < 16) {
  situacao19 = "Não votante";
} else if (idade19 <= 17) {
  situacao19 = "Voto opcional";
} else if (idade19 <= 70) {
  situacao19 = "Voto obrigatório";
} else {
  situacao19 = "Voto opcional";
}
console.log("Situação:", situacao19);
alert("Situação: " + situacao19);
</script>

<!-- Exercício 20 -->

<script>
const peso20 = Number(prompt("Digite seu peso (kg):"));
const altura20 = Number(prompt("Digite sua altura (m):"));
const imc20 = peso20 / (altura20 * altura20);
let classificacao20;
if (imc20 < 18.5) {
  classificacao20 = "Abaixo do peso";
} else if (imc20 < 25) {
  classificacao20 = "Peso normal";
} else if (imc20 < 30) {
  classificacao20 = "Sobrepeso";
} else {
  classificacao20 = "Obesidade";
}
console.log(`Seu IMC é: ${imc20.toFixed(2)}\nClassificação: ${classificacao20}`);
alert(`Seu IMC é: ${imc20.toFixed(2)}\nClassificação: ${classificacao20}`);
</script>

<!-- Exercício 21 -->

<script>
const preco21 = Number(prompt("Digite o preço do produto:"));
const opcao21 = Number(prompt("Opções de pagamento:\n1- À vista (10% desconto)\n2- 2x no cartão\n3- 3x ou mais (20% juros)\nDigite a opção:"));
let valorFinal21;
if (opcao21 === 1) {
  valorFinal21 = preco21 * 0.9;
} else if (opcao21 === 2) {
  valorFinal21 = preco21;
} else if (opcao21 >= 3) {
  valorFinal21 = preco21 * 1.2;
} else {
  valorFinal21 = preco21;
}
console.log("Valor final: R$", valorFinal21.toFixed(2));
alert("Valor final: R$ " + valorFinal21.toFixed(2));
</script>

<!-- Exercício 22 -->

<script>
const lado1 = Number(prompt("Digite o primeiro lado:"));
const lado2 = Number(prompt("Digite o segundo lado:"));

<!-- Exercício 23 -->

<script>
const n1_23 = Number(prompt("Digite o primeiro número:"));
const n2_23 = Number(prompt("Digite o segundo número:"));
const n3_23 = Number(prompt("Digite o terceiro número:"));

<!-- Exercício 24 -->

<script>
const num1_24 = Number(prompt("Digite o primeiro número:"));
const num2_24 = Number(prompt("Digite o segundo número:"));

<!-- Exercício 25 -->

<script>
const ano25 = Number(prompt("Digite um ano:"));
let bissexto25 = (ano25 % 4 === 0 && ano25 % 100 !== 0) || (ano25 % 400 === 0);
if (bissexto25) {
  console.log(`O ano ${ano25} é bissexto.`);
  alert(`O ano ${ano25} é bissexto.`);
} else {
  console.log(`O ano ${ano25} NÃO é bissexto.`);
  alert(`O ano ${ano25} NÃO é bissexto.`);
}
</script>

<!-- Exercício 26 -->

<script>
const anoNascimento26 = Number(prompt("Digite o ano de nascimento:"));
const idade26 = 2025 - anoNascimento26;
let situacao26;
if (idade26 < 18) {
  situacao26 = `Ainda vai se alistar. Faltam ${18 - idade26} anos.`;
} else if (idade26 === 18) {
  situacao26 = "Você deve se alistar este ano.";
} else {
  situacao26 = "Você já passou do alistamento.";
}
console.log(`Você tem ${idade26} anos em 2025.\n${situacao26}`);
alert(`Você tem ${idade26} anos em 2025.\n${situacao26}`);
</script>

<!-- Exercício 27 -->

<script>

<!-- Exercício 30 -->
 
<script>
const valorCasa30 = Number(prompt("Digite o valor da casa:"));
const salario30 = Number(prompt("Digite seu salário:"));
const anos30 = Number(prompt("Em quantos anos vai pagar:"));
const prestacao30 = valorCasa30 / (anos30 * 12);
if (prestacao30 <= salario30 * 0.3) {
  console.log(`A prestação mensal será de: R$ ${prestacao30.toFixed(2)}\nEmpréstimo APROVADO!`);
  alert(`A prestação mensal será de: R$ ${prestacao30.toFixed(2)}\nEmpréstimo APROVADO!`);
} else {
  console.log(`A prestação mensal será de: R$ ${prestacao30.toFixed(2)}\nEmpréstimo NEGADO!`);
  alert(`A prestação mensal será de: R$ ${prestacao30.toFixed(2)}\nEmpréstimo NEGADO!`);
}
</script>
